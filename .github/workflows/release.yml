name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'pnpm'

    - name: Update version
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "Updating version to $VERSION"
        pnpm version $VERSION --no-git-tag-version --allow-same-version
        jq --arg v "$VERSION" '.version = $v' src/manifest.json > src/manifest.tmp.json && mv src/manifest.tmp.json src/manifest.json

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      
    - name: Run tests
      run: pnpm test:run
      
    - name: Build extension
      run: pnpm build:prod
      
    - name: Package extension
      run: pnpm package
      
    - name: Commit version update
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add package.json src/manifest.json pnpm-lock.yaml
        git commit -m "chore: bump version to ${{ github.ref_name }}"
        git push origin HEAD:main

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: tab-audit.zip
        draft: false
        prerelease: false
        make_latest: true
        overwrite_files: true
        token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
